services:
  db:
    image: postgres:17
    container_name: antracvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: antracvision
      POSTGRES_PASSWORD: antracvision
      POSTGRES_DB: antracvision
    ports:
      - "5433:5432"
    volumes:
      - antracvision_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antracvision -d antracvision"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  antracvision_pgdata:
